# Kubernetes Deployment and Service for API and Dashboard

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-eval-api
  namespace: ai-evaluation
  labels:
    app: ai-eval-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-eval-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-eval-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-eval-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ai-evaluation-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: LOG_LEVEL
            - name: MAX_CONCURRENT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: MAX_CONCURRENT_REQUESTS
            - name: REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: REQUEST_TIMEOUT
            - name: ENABLE_CACHING
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: ENABLE_CACHING
            - name: EVALUATOR_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: EVALUATOR_MODEL
            - name: EMBEDDING_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: EMBEDDING_MODEL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: ANTHROPIC_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-eval-secrets
                  key: GROQ_API_KEY
            - name: DATABASE_URL
              value: "postgresql://ai_eval:REPLACE_PASSWORD@postgres:5432/evaluation"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ai-eval-data
        - name: logs
          emptyDir: {}
      nodeSelector:
        workload-type: general
      tolerations:
        - key: "node-type"
          operator: "Equal"
          value: "general"
          effect: "NoSchedule"

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: ai-eval-api
  namespace: ai-evaluation
  labels:
    app: ai-eval-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  selector:
    app: ai-eval-api

---
# Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-eval-dashboard
  namespace: ai-evaluation
  labels:
    app: ai-eval-dashboard
    component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-eval-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-eval-dashboard
        component: dashboard
    spec:
      serviceAccountName: ai-eval-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: dashboard
          image: ai-evaluation-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-eval-config
                  key: LOG_LEVEL
          command: ["streamlit", "run", "src/dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ai-eval-data
      nodeSelector:
        workload-type: general

---
# Dashboard Service
apiVersion: v1
kind: Service
metadata:
  name: ai-eval-dashboard
  namespace: ai-evaluation
  labels:
    app: ai-eval-dashboard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8501
      targetPort: http
      protocol: TCP
  selector:
    app: ai-eval-dashboard

---
# Ingress for API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-eval-api-ingress
  namespace: ai-evaluation
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.your-domain.com
      secretName: ai-eval-api-tls
  rules:
    - host: api.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-eval-api
                port:
                  name: http

---
# Ingress for Dashboard
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-eval-dashboard-ingress
  namespace: ai-evaluation
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - app.your-domain.com
      secretName: ai-eval-dashboard-tls
  rules:
    - host: app.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-eval-dashboard
                port:
                  name: http

---
# Horizontal Pod Autoscaler for API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-eval-api-hpa
  namespace: ai-evaluation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-eval-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80