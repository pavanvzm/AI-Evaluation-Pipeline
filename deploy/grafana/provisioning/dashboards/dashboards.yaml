# Grafana Dashboard Provisioning

apiVersion: 1

providers:
  - name: 'AI Evaluation Pipeline'
    orgId: 1
    folder: 'AI Evaluation'
    folderUid: 'ai-evaluation'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards