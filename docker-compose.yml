# AI Evaluation Pipeline - Docker Compose Configuration
# Supports development, staging, and production environments

services:
  # =============================================================================
  # API Service
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ai-eval-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-eval-network

  # =============================================================================
  # Dashboard Service
  # =============================================================================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: ai-eval-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    networks:
      - ai-eval-network

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-eval-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ai_eval}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_production}
      - POSTGRES_DB=${POSTGRES_DB:-evaluation}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_eval}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-eval-network

  # =============================================================================
  # Redis Cache (optional, for caching)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: ai-eval-cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-eval-network

  # =============================================================================
  # Nginx Reverse Proxy (production)
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: ai-eval-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - ai-eval-network
    profiles:
      - production

  # =============================================================================
  # Prometheus Metrics (optional)
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-eval-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - ai-eval-network
    profiles:
      - monitoring

  # =============================================================================
  # Grafana Dashboard (optional)
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ai-eval-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ai-eval-network
    profiles:
      - monitoring

# =============================================================================
# Networks
# =============================================================================
networks:
  ai-eval-network:
    driver: bridge
    name: ai-eval-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: ai-eval-postgres
  redis_data:
    name: ai-eval-redis
  prometheus_data:
    name: ai-eval-prometheus
  grafana_data:
    name: ai-eval-grafana